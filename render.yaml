# Render Blueprint — auto-configures the service when you connect this repo.
# On Render: New + → Blueprint → pick your repo → it reads this file. No form-filling.
services:
  - type: web
    name: footymodel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      # Optional: set this in the Render dashboard to enable live data.
      # Leave unset and the app runs on its bundled snapshot.
      - key: FOOTBALL_DATA_TOKEN
        sync: false
